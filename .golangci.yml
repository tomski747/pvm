run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - godot
    - misspell

linters-settings:
  godot:
    scope: declarations

issues:
  exclude-rules:
    # Test helpers don't need doc comments
    - path: "_test\\.go"
      linters:
        - godot
